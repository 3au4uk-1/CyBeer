<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyBeer — Игрок</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">🍺</span>
      <h1>CyBeer</h1>
    </div>
    <div class="status-line">
      <div class="battery" id="batteryWrap" title="Батарея">
        <span class="battery-icon" id="batteryIcon" aria-hidden="true">🔋</span>
        <span id="batteryPct">—</span>
      </div>
      <span id="stateBadge" class="badge">…</span>
      <span class="ver" id="fwVer"></span>
    </div>
    <nav></nav>
  </header>

  <main>
    <section class="panel" id="playerPanel">
      <div class="player-card">
        <div class="player-title-row">
          <h2 id="playerName">Загрузка…</h2>
          <button type="button" id="renameBtn" class="btn-icon" hidden title="Изменить имя" aria-label="Изменить имя">✏️</button>
        </div>
        <div id="renameForm" hidden>
          <input type="text" id="renameInput" maxlength="32" placeholder="Новое имя" autocomplete="off" />
          <button type="button" id="renameSave">Сохранить</button>
          <button type="button" id="renameCancel">Отмена</button>
          <p class="hint err" id="renameMsg"></p>
        </div>
        <div class="player-rank" id="playerRank"></div>
      </div>

      <div class="stat-grid" id="statGrid"></div>

      <h3>История заездов</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Дата</th><th>Время</th></tr>
          </thead>
          <tbody id="playerRunsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <style>
    #renameForm { margin: 0.5rem 0; display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
    #renameForm input { flex: 1; min-width: 10rem; }
    #renameMsg { width: 100%; margin: 0; }
  </style>
  <script>window.__CYBEER_PAGE__ = "player";</script>
  <script src="/app.js"></script>
  <script>
  (function () {
    var cy = window.__cybeer;
    var p = new URLSearchParams(location.search);
    var id = p.get("id");
    if (!id) {
      document.getElementById("playerName").textContent = "Не указан ID участника";
      return;
    }

    var titleRow = document.querySelector(".player-title-row");
    var renameBtn = document.getElementById("renameBtn");
    var renameForm = document.getElementById("renameForm");
    var renameInput = document.getElementById("renameInput");
    var renameSave = document.getElementById("renameSave");
    var renameCancel = document.getElementById("renameCancel");
    var renameMsg = document.getElementById("renameMsg");

    function showRename(show) {
      if (titleRow) titleRow.hidden = show;
      renameForm.hidden = !show;
      if (!show) renameMsg.textContent = "";
      else renameInput.focus();
    }

    cy.loadParticipants().then(function () {
      var name = cy.nameByPid.get(id) || id.slice(0, 12) + "…";
      document.getElementById("playerName").textContent = name;
      document.title = "CyBeer — " + name;
      renameBtn.hidden = false;
    });

    renameBtn.addEventListener("click", function () {
      renameInput.value = document.getElementById("playerName").textContent;
      renameMsg.textContent = "";
      showRename(true);
    });

    renameCancel.addEventListener("click", function () {
      showRename(false);
    });

    renameSave.addEventListener("click", async function () {
      var newName = renameInput.value.trim();
      if (!newName) {
        renameMsg.textContent = "Имя не может быть пустым";
        return;
      }
      renameMsg.textContent = "";
      try {
        var res = await fetch("/api/participants/" + encodeURIComponent(id), {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: newName }),
        });
        if (res.ok) {
          document.getElementById("playerName").textContent = newName;
          document.title = "CyBeer — " + newName;
          cy.nameByPid.set(id, newName);
          showRename(false);
          return;
        }
        var data = await res.json().catch(function () { return {}; });
        if (data.error === "name_taken") {
          renameMsg.textContent = "Это имя уже занято";
        } else if (data.error === "not_found") {
          renameMsg.textContent = "Участник не найден";
        } else {
          renameMsg.textContent = "Ошибка: " + (data.error || res.status);
        }
      } catch (_) {
        renameMsg.textContent = "Ошибка сети";
      }
    });

    fetch("/api/participants/" + encodeURIComponent(id) + "/stats")
      .then(function (r) {
        if (!r.ok) throw new Error("stats " + r.status);
        return r.json();
      })
      .then(function (st) {
        var grid = document.getElementById("statGrid");
        var items = [
          { label: "Заездов", val: st.runCount || 0 },
          { label: "Рекорд", val: cy.formatDuration(st.bestDurationUs) },
          { label: "Среднее", val: cy.formatDuration(st.avgDurationUs) },
          { label: "Худшее", val: cy.formatDuration(st.worstDurationUs) },
          { label: "Последний", val: cy.formatDuration(st.lastDurationUs) },
        ];
        grid.innerHTML = "";
        for (var i = 0; i < items.length; i++) {
          var div = document.createElement("div");
          div.className = "stat-item";
          div.innerHTML =
            '<div class="stat-val">' +
            items[i].val +
            '</div><div class="stat-label">' +
            items[i].label +
            "</div>";
          grid.appendChild(div);
        }
      })
      .catch(function () {
        document.getElementById("statGrid").innerHTML =
          '<p class="hint">Ошибка загрузки статистики</p>';
      });

    fetch("/api/leaderboard?limit=50")
      .then(function (r) { return r.json(); })
      .then(function (lb) {
        if (!Array.isArray(lb)) return;
        for (var i = 0; i < lb.length; i++) {
          if (lb[i].participantId === id) {
            document.getElementById("playerRank").textContent =
              "Место в лидерборде: #" + lb[i].rank;
            break;
          }
        }
      })
      .catch(function () {});

    fetch("/api/participants/" + encodeURIComponent(id) + "/runs")
      .then(function (r) {
        if (!r.ok) throw new Error("runs " + r.status);
        return r.json();
      })
      .then(function (runs) {
        var body = document.getElementById("playerRunsBody");
        if (!Array.isArray(runs) || runs.length === 0) {
          body.innerHTML =
            '<tr><td colspan="2" style="color:var(--muted)">Нет заездов</td></tr>';
          return;
        }
        body.innerHTML = "";
        for (var i = 0; i < runs.length; i++) {
          var run = runs[i];
          var dur = run.duration_us != null ? run.duration_us : run.durationUs;
          var when = run.finished_at || run.finishedAt;
          var tr = document.createElement("tr");
          tr.innerHTML =
            "<td>" +
            cy.formatDate(when) +
            "</td><td>" +
            cy.formatDuration(dur) +
            "</td>";
          body.appendChild(tr);
        }
      })
      .catch(function () {
        document.getElementById("playerRunsBody").innerHTML =
          '<tr><td colspan="2">Ошибка</td></tr>';
      });
  })();
  </script>
</body>
</html>
