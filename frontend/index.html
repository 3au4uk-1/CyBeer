<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyBeer</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">🍺</span>
      <h1>CyBeer</h1>
    </div>
    <div class="status-line">
      <div class="battery" id="batteryWrap" title="Батарея">
        <span class="battery-icon" id="batteryIcon" aria-hidden="true">🔋</span>
        <span id="batteryPct">—</span>
      </div>
      <span id="stateBadge" class="badge">…</span>
      <span class="ver" id="fwVer"></span>
    </div>
    <nav></nav>
  </header>

  <main>
    <section class="panel timer-hero" id="timerHero" role="button" tabindex="0" aria-label="Результат заезда">
      <div class="timer-value" id="timerValue">0.00с</div>
      <div class="timer-label" id="timerLabel">Готов к старту</div>
      <p class="timer-hint" id="timerHint" hidden></p>
    </section>

    <div class="modal-overlay" id="claimModal" hidden>
      <div class="modal panel claim-panel" role="dialog" aria-labelledby="claimModalTitle" aria-modal="true">
        <h2 id="claimModalTitle">Привязать заезд</h2>
        <p>Результат: <strong class="claim-result" id="claimModalTime">—</strong></p>
        <form id="claimModalForm">
          <label for="claimModalSelect">Участник</label>
          <select id="claimModalSelect">
            <option value="">— Новый участник —</option>
          </select>
          <label for="claimModalName">Или новое имя</label>
          <input type="text" id="claimModalName" placeholder="Имя участника" autocomplete="name" />
          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="claimModalCancel">Отмена</button>
            <button type="submit" class="btn-primary">Сохранить</button>
          </div>
        </form>
        <p id="claimModalMsg" class="msg" aria-live="polite"></p>
      </div>
    </div>

    <section class="panel">
      <h2>Лидерборд</h2>
      <p class="hint"><a href="/spectator.html">Режим для ТВ</a></p>
      <div class="table-wrap">
        <table class="leaderboard">
          <thead>
            <tr>
              <th>#</th>
              <th>Имя</th>
              <th>Время</th>
              <th>Дата</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>window.__CYBEER_PAGE__ = "index";</script>
  <script src="/app.js"></script>
</body>
</html>
