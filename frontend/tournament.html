<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Турнир — CyBeer</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    .bracket-wrap {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      align-items: stretch;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin-top: 0.75rem;
    }
    .bracket-col {
      min-width: 11.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .bracket-col h3 {
      margin: 0 0 0.25rem;
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .bracket-match {
      background: linear-gradient(180deg, rgba(61, 42, 31, 0.9), rgba(30, 24, 18, 0.95));
      border: 1px solid var(--stout);
      border-radius: 8px;
      padding: 0.6rem 0.65rem;
      font-size: 0.86rem;
    }
    .bracket-match.win {
      border-color: rgba(107, 191, 114, 0.45);
      box-shadow: 0 0 0 1px rgba(107, 191, 114, 0.12);
    }
    .bracket-match.active-match {
      border-color: var(--amber);
      box-shadow: 0 0 12px rgba(199, 128, 45, 0.35);
    }
    .bracket-row {
      margin: 0.2rem 0;
      padding: 0.15rem 0;
      border-bottom: 1px dashed rgba(154, 138, 120, 0.25);
    }
    .bracket-row:last-child {
      border-bottom: none;
    }
    .bracket-slot {
      color: var(--gold);
      font-size: 0.72rem;
      margin-right: 0.25rem;
    }
    .bracket-muted {
      color: var(--muted);
      font-size: 0.78rem;
    }
    #torHead {
      margin: 0.25rem 0 0.5rem;
    }
    .pill {
      display: inline-block;
      padding: 0.08rem 0.45rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: rgba(199, 128, 45, 0.2);
      color: var(--amber);
      margin-left: 0.35rem;
    }
    .pill-pending {
      background: rgba(232, 180, 74, 0.2);
      color: var(--gold);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">🍺</span>
      <h1>CyBeer</h1>
    </div>
    <nav></nav>
  </header>

  <main>
    <section class="panel">
      <div id="torHead"><span class="bracket-muted">Загрузка сетки…</span></div>
      <p id="torPending" class="hint"></p>
      <div id="bracketWrap" class="bracket-wrap" aria-label="Сетка турнира"></div>
      <p class="hint">Обновляется каждые 8 секунд. Побеждает меньшее время, когда оба заезда заявлены.</p>
    </section>
  </main>

  <script>window.__CYBEER_PAGE__ = "tournament";</script>
  <script src="/app.js"></script>
  <script>
    (function () {
      var cy = window.__cybeer;
      var nameByPid = cy.nameByPid;

      function shortId(s) {
        if (!s || typeof s !== "string") return "—";
        return s.length > 14 ? s.slice(0, 6) + "…" + s.slice(-4) : s;
      }

      function pname(pid) {
        if (!pid) return "bye";
        return nameByPid.get(pid) || shortId(pid);
      }

      function renderMatchCard(m, pending) {
        var won = !!(m.winnerParticipantId && String(m.winnerParticipantId).length);
        var isActive = pending && pending.matchId === m.id;
        var el = document.createElement("article");
        el.className = "bracket-match" + (won ? " win" : "") + (isActive ? " active-match" : "");

        var pendingTag = "";
        if (isActive) {
          pendingTag =
            '<span class="pill pill-pending">Следующий заезд → слот ' + pending.slot + "</span>";
        }

        var ra = shortId(m.runIdA || "");
        var rb = shortId(m.runIdB || "");

        el.innerHTML =
          '<div class="bracket-muted">Матч ' +
          shortId(m.id) +
          "</div>" +
          pendingTag +
          '<div class="bracket-row"><span class="bracket-slot">A</span>' +
          pname(m.participantAId) +
          " · заезд " +
          ra +
          "</div>" +
          '<div class="bracket-row"><span class="bracket-slot">B</span>' +
          pname(m.participantBId) +
          " · заезд " +
          rb +
          "</div>" +
          (won
            ? '<div class="bracket-muted" style="margin-top:6px;">Победитель · ' +
              pname(m.winnerParticipantId) +
              "</div>"
            : "");

        return el;
      }

      async function tick() {
        await cy.loadParticipants();
        var wrap = document.getElementById("bracketWrap");
        var head = document.getElementById("torHead");
        var pendEl = document.getElementById("torPending");
        var existingChamp = document.querySelector(".champion-card");
        if (existingChamp) existingChamp.remove();

        try {
          var rs = await fetch("/api/tournaments/active");
          var data = await rs.json();
          var tor = data.tournament;
          var pending = data.pendingNextRun || null;

          wrap.innerHTML = "";
          pendEl.textContent = "";

          if (!tor || !Array.isArray(tor.matches)) {
            head.innerHTML =
              '<span class="bracket-muted">Нет активного турнира на устройстве.</span>';
            return;
          }

          var st = tor.status || "—";
          var champ = tor.championParticipantId;
          head.innerHTML =
            "<strong>" +
            (tor.name || "Турнир") +
            "</strong> · <span class=\"bracket-muted\">" +
            shortId(tor.id) +
            "</span> <span class=\"pill\">" +
            String(st) +
            "</span>";

          if (champ) {
            var card = document.createElement("div");
            card.className = "champion-card";
            card.innerHTML =
              '<div style="font-size:0.9rem;color:var(--muted)">🏆 Чемпион</div><div class="champion-name">' +
              pname(champ) +
              "</div>";
            wrap.parentElement.insertBefore(card, wrap);
          }

          if (pending && pending.slot) {
            pendEl.textContent =
              "Очередь PIN: привяжите следующий заезд к матчу " +
              shortId(pending.matchId) +
              ", слот " +
              pending.slot;
          }

          var cols = {};
          for (var i = 0; i < tor.matches.length; i++) {
            var m = tor.matches[i];
            var c = typeof m.column === "number" ? m.column : 0;
            if (!cols[c]) cols[c] = [];
            cols[c].push(m);
          }
          var order = Object.keys(cols)
            .map(function (x) {
              return Number(x);
            })
            .sort(function (a, b) {
              return b - a;
            });

          for (var oi = 0; oi < order.length; oi++) {
            var col = order[oi];
            var colEl = document.createElement("div");
            colEl.className = "bracket-col";
            var h = document.createElement("h3");
            h.textContent = "Раунд " + (oi + 1);
            colEl.appendChild(h);

            var list = cols[col]
              .slice()
              .sort(function (a, b) {
                return (Number(a.index) || 0) - (Number(b.index) || 0);
              });
            for (var li = 0; li < list.length; li++) {
              colEl.appendChild(renderMatchCard(list[li], pending));
            }
            wrap.appendChild(colEl);
          }
        } catch (_) {
          if (head) head.innerHTML = '<span class="bracket-muted">Офлайн или ошибка загрузки.</span>';
          if (wrap) wrap.innerHTML = "";
          if (pendEl) pendEl.textContent = "";
        }
      }

      tick();
      setInterval(tick, 8000);
    })();
  </script>
</body>
</html>
