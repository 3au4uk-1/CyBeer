<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — CyBeer</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">🍺</span>
      <h1>CyBeer</h1>
    </div>
    <nav>
      <a href="/">Leaderboard</a>
      <a href="/claim.html">Claim run</a>
    </nav>
  </header>

  <main>
    <p id="adminMsg" class="msg" aria-live="polite"></p>
    <section class="panel" id="setupPanel">
      <h2>First-time admin PIN</h2>
      <p class="hint">Stores SHA-256 hash with random salt on the device.</p>
      <form id="setupPinForm">
        <label>
          New PIN
          <input type="password" name="pin1" autocomplete="new-password" minlength="4" maxlength="32" required />
        </label>
        <button type="submit">Save PIN</button>
      </form>
    </section>

    <section class="panel" id="unlockPanel">
      <h2>Unlock admin</h2>
      <p class="hint">PIN stays in session storage for this browser tab only.</p>
      <form id="unlockForm">
        <label>
          PIN
          <input type="password" id="unlockPin" minlength="4" maxlength="32" autocomplete="off" />
        </label>
        <button type="submit">Remember PIN</button>
      </form>
      <button type="button" id="clearPinBtn">Clear PIN from session</button>
    </section>

    <section class="panel hidden" id="adminPanel">
      <h2>Manual run</h2>
      <form id="addRunForm">
        <label>Run id <span class="hint">(leave empty for new UUID)</span>
          <input type="text" name="id" placeholder="auto" maxlength="38" />
        </label>
        <label>
          Participant id (UUID or empty)
          <input type="text" name="participant_id" maxlength="38" />
        </label>
        <label>
          Duration (µs)
          <input type="number" name="duration_us" value="0" />
        </label>
        <label>
          Finished at (ISO UTC)
          <input type="text" name="finished_at" placeholder="auto if empty" />
        </label>
        <label>
          <input type="checkbox" name="claimed" /> Claimed
        </label>
        <label>Tournament match id (optional)
          <input type="text" name="tournament_match_id" maxlength="38" />
        </label>
        <button type="submit">POST /api/admin/runs</button>
      </form>

      <h2>Edit / delete run</h2>
      <form id="patchRunForm">
        <label>Run id
          <input type="text" name="patch_id" maxlength="38" required />
        </label>
        <textarea name="patch_json" rows="5" cols="72" spellcheck="false" placeholder='Partial JSON fields, e.g. {"participant_id":"","claimed":true}' ></textarea>
        <button type="submit">PATCH</button>
      </form>
      <form id="deleteRunForm">
        <label>Run id
          <input type="text" name="delete_id" maxlength="38" required />
        </label>
        <button type="submit" class="danger">DELETE</button>
      </form>

      <h2>Data</h2>
      <button type="button" id="resetBtn">Erase runs &amp; participants JSON</button>

      <h2>Export</h2>
      <form id="exportForm">
        <label>Format</label>
        <select id="exportFmt">
          <option value="json">JSON</option>
          <option value="csv">CSV</option>
        </select>
        <button type="submit">Download export</button>
      </form>

      <h2>LED strip</h2>
      <form id="settingsForm">
        <label>
          LED count (1–64)
          <input type="number" name="ledCount" min="1" max="64" value="24" />
        </label>
        <label>
          Brightness (1–255)
          <input type="number" name="brightness" min="1" max="255" value="80" />
        </label>
        <p class="hint">Device reboots after saving NVS settings.</p>
        <button type="submit">Save &amp; restart</button>
      </form>

    </section>
  </main>

  <style>
    #clearPinBtn { margin-top: 0.5rem; background: transparent; border: 1px solid var(--muted); color: var(--muted); }
    textarea { width: 100%; font-family: ui-monospace, monospace; font-size: 0.85rem; }
    button.danger { border-color: var(--danger); color: var(--danger); }
    .panel.hidden { display: none !important; }
    #unlockPanel.hidden, #setupPanel.hidden { display: none !important; }
  </style>

  <script src="/admin.js"></script>
</body>
</html>
